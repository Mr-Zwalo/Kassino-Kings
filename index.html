<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kassino Kings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="game-container">

    <!-- ── Header ───────────────────────────────────────────────────────── -->
    <div id="header">
        <div id="game-title">♠ Kassino Kings ♥</div>

        <div id="score-panel">
            <div class="score-box">
                <div class="score-box-label">You</div>
                <div id="player-game-score" class="game-score">0</div>
                <div id="player-round-info" class="round-info">Captured: 0</div>
            </div>
            <div class="score-vs">vs</div>
            <div class="score-box">
                <div class="score-box-label">AI</div>
                <div id="ai-game-score" class="game-score">0</div>
                <div id="ai-round-info" class="round-info">Captured: 0</div>
            </div>
        </div>
    </div>

    <!-- ── AI hand ──────────────────────────────────────────────────────── -->
    <div id="ai-area">
        <div id="ai-label-row">
            <span>AI's Hand</span>
            <span id="ai-card-count">10 cards</span>
        </div>
        <div id="ai-hand"></div>
    </div>

    <!-- ── Center table ─────────────────────────────────────────────────── -->
    <div id="center-area">
        <!-- Player's capture pile (left side) -->
        <div class="pile-col" id="player-pile-col">
            <div class="pile-label">Your Pile</div>
            <div id="player-pile-top" class="pile-top-card"></div>
            <div id="player-pile-count" class="pile-count">0 cards</div>
        </div>

        <!-- Center table cards -->
        <div id="center-table">
            <div id="center-table-label">Center Table</div>
            <div id="center-cards"></div>
        </div>

        <!-- AI's capture pile (right side) — top card is clickable for capture/build -->
        <div class="pile-col" id="ai-pile-col">
            <div class="pile-label">AI's Pile</div>
            <div id="ai-pile-top" class="pile-top-card"></div>
            <div id="ai-pile-count" class="pile-count">0 cards</div>
            <div id="ai-pile-hint" class="pile-hint"></div>
        </div>
    </div>

    <!-- ── Player area ──────────────────────────────────────────────────── -->
    <div id="player-area">
        <div id="status-bar">
            <div id="status-message">Initialising…</div>
        </div>
        <div id="player-hand"></div>
        <div id="action-buttons">
            <button id="btn-capture"   class="action-btn" disabled>Capture</button>
            <button id="btn-build"     class="action-btn" disabled>Build</button>
            <button id="btn-drift"     class="action-btn" disabled>Drift</button>
            <button id="btn-play-card" class="action-btn" disabled>Play Card</button>
            <button id="btn-augment"   class="action-btn btn-augment"  style="display:none" disabled>Augment</button>
            <button id="btn-end-turn"  class="action-btn btn-end-turn" style="display:none" disabled>End Turn</button>
            <button id="btn-new-game"  class="action-btn btn-secondary">New Game</button>
        </div>
        <div id="move-log" class="move-log" aria-label="Move history"></div>
    </div>

</div><!-- #game-container -->

<!-- ── Round-over overlay ─────────────────────────────────────────────────── -->
<div id="score-overlay" class="overlay hidden">
    <div class="overlay-box">
        <h2 id="overlay-title">Round Complete!</h2>
        <div id="score-breakdown"></div>
        <button id="btn-next-round" class="action-btn">Next Round</button>
    </div>
</div>

<!-- ── Game-over overlay ──────────────────────────────────────────────────── -->
<div id="gameover-overlay" class="overlay hidden">
    <div class="overlay-box">
        <h2 id="gameover-title">Game Over!</h2>
        <div id="gameover-content"></div>
        <button id="btn-play-again" class="action-btn">Play Again</button>
    </div>
</div>

<script src="js/deck.js"></script>
<script src="js/game.js"></script>
<script src="js/ai.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
